info:
  name: courseById_with_JSON_Body
  type: http
  seq: 3

http:
  method: PUT
  url: http://localhost:3001/api/v1/courses/5
  body:
    type: json
    data: |2-
        {
          "id": 5,
          "title": "Neu Node.js Einführung",
          "date": "2024-06-01",
          "status": "inactive",
          "description": "Backend-Entwicklung mit Node.js",
          "instructor": "Prof. Klein",
          "capacity": 20,
          "participantsList": [
            {
              "id": 8,
              "name": "Heinrich Keller",
              "email": "heinrich.keller@example.com",
              "courseId": 5,
              "status": "inactive",
              "enrollmentDate": "2024-05-15"
            }
          ]
        }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('Status 200', () => {
          expect(res.status).to.equal(200);
        });

        test('Antwortzeit unter 2000ms', () => {
          expect(res.responseTime).to.be.below(2000);
        });

        test('Response ist JSON (content-type)', () => {
          expect(res.headers['content-type']).to.include('application/json');
        });

        test('Response hat message-Feld', () => {
          expect(res.body).to.have.property('message');
        });

        test('message ist ein String', () => {
          expect(res.body.message).to.be.a('string');
        });

        test('message enthält die ID aus der URL', () => {
          const urlParts = req.url.split('/');
          const idFromUrl = urlParts[urlParts.length - 1];
          expect(res.body.message).to.include(idFromUrl);
        });

        test('message enthält "aktualisiert"', () => {
          expect(res.body.message).to.include('aktualisiert');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
