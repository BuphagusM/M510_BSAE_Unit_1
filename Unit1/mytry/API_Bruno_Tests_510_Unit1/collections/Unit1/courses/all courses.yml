info:
  name: all courses
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3001/api/v1/courses
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('Status 200', () => {
          expect(res.status).to.equal(200);
        });

        test('Antwortzeit unter 2000ms', () => {
          expect(res.responseTime).to.be.below(2000);
        });

        test('Response ist JSON (content-type)', () => {
          expect(res.headers['content-type']).to.include('application/json');
        });

        test('Response ist ein Array', () => {
          expect(res.body).to.be.an('array');
        });

        test('Array ist nicht leer', () => {
          expect(res.body.length).to.be.greaterThan(0);
        });

        test('Kurs hat korrekte CourseDTO', () => {
          expect(res.body[0]).to.have.property('title');
          expect(res.body[0]).to.have.property('date');
          expect(res.body[0]).to.have.property('status');
          expect(res.body[0]).to.have.property('description');
          expect(res.body[0]).to.have.property('instructor');
          expect(res.body[0]).to.have.property('capacity');  
          expect(res.body[0]).to.have.property('participantsList');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
